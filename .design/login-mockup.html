<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fanzy — Login Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gray-50: #fafafa;
    --gray-100: #e5e5e5;
    --gray-200: #cccccc;
    --gray-300: #a3a3a3;
    --gray-400: #8a8a8a;
    --gray-500: #6b6b6b;
    --gray-600: #525252;
    --gray-700: #3a3a3a;
    --gray-800: #262626;
    --gray-900: #1a1a1a;
    --gray-950: #0e0e0e;
    --accent: #d4d4d4;
    --accent-hover: #e5e5e5;
    --error: #ef4444;
    --success: #22c55e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background-color: var(--gray-950);
    color: var(--gray-100);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .login-container {
    width: 100%;
    max-width: 380px;
    padding: 0 24px;
    animation: fadeUp 0.5s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-section {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-icon {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .logo-icon svg {
    width: 28px;
    height: 28px;
    color: var(--gray-50);
  }

  .logo-wordmark {
    font-size: 20px;
    font-weight: 600;
    color: var(--gray-50);
    letter-spacing: -0.02em;
  }

  .tagline {
    font-size: 14px;
    color: var(--gray-500);
    font-weight: 400;
  }

  .form-group {
    margin-bottom: 12px;
  }

  .input-field {
    width: 100%;
    padding: 12px 14px;
    background: var(--gray-900);
    border: 1px solid var(--gray-800);
    border-radius: 8px;
    color: var(--gray-100);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease;
  }

  .input-field::placeholder {
    color: var(--gray-600);
  }

  .input-field:focus {
    border-color: var(--gray-500);
  }

  .input-field.has-error {
    border-color: var(--error);
  }

  .error-msg {
    font-size: 12px;
    color: var(--error);
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .error-msg.visible {
    opacity: 1;
  }

  .submit-btn {
    width: 100%;
    height: 44px;
    margin-top: 20px;
    background: var(--gray-50);
    border: none;
    border-radius: 8px;
    color: var(--gray-950);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.15s ease, transform 0.1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .submit-btn:hover {
    background: var(--gray-200);
  }

  .submit-btn:active {
    transform: scale(0.99);
  }

  .submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid var(--gray-950);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--gray-800);
  }

  .divider-text {
    font-size: 12px;
    color: var(--gray-600);
  }

  .oauth-btn {
    width: 100%;
    padding: 11px 14px;
    background: transparent;
    border: 1px solid var(--gray-800);
    border-radius: 8px;
    color: var(--gray-300);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: border-color 0.15s ease, background-color 0.15s ease, color 0.15s ease;
  }

  .oauth-btn:hover {
    border-color: var(--gray-600);
    background: var(--gray-900);
    color: var(--gray-50);
  }

  .oauth-btn svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .footer-text {
    text-align: center;
    margin-top: 32px;
    font-size: 13px;
    color: var(--gray-600);
  }

  .footer-text a {
    color: var(--gray-400);
    text-decoration: none;
    transition: color 0.15s ease;
  }

  .footer-text a:hover {
    color: var(--gray-200);
  }

  .state-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: var(--gray-900);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--gray-800);
  }

  .state-btn {
    padding: 6px 14px;
    background: transparent;
    border: none;
    border-radius: 7px;
    color: var(--gray-500);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .state-btn:hover {
    color: var(--gray-300);
  }

  .state-btn.active {
    background: var(--gray-800);
    color: var(--gray-100);
  }

  .label {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 500;
    color: var(--gray-600);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="label">Fanzy — Login Page Mockup</div>

<div class="login-container">
  <div class="logo-section">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
        <line x1="7" y1="2" x2="7" y2="22"/>
        <line x1="17" y1="2" x2="17" y2="22"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <line x1="2" y1="7" x2="7" y2="7"/>
        <line x1="2" y1="17" x2="7" y2="17"/>
        <line x1="17" y1="7" x2="22" y2="7"/>
        <line x1="17" y1="17" x2="22" y2="17"/>
      </svg>
      <span class="logo-wordmark">Fanzy</span>
    </div>
    <p class="tagline">Storyboard system for video production</p>
  </div>

  <button class="oauth-btn" id="googleBtn">
    <svg viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">or</span>
    <div class="divider-line"></div>
  </div>

  <form id="loginForm" onsubmit="handleSubmit(event)">
    <div class="form-group">
      <input type="email" class="input-field" id="emailInput" placeholder="Email address" autocomplete="email">
      <p class="error-msg" id="emailError">Please enter a valid email address</p>
    </div>

    <div class="form-group">
      <input type="password" class="input-field" id="passwordInput" placeholder="Password" autocomplete="current-password">
      <p class="error-msg" id="passwordError">Password is required</p>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <span class="btn-text" id="btnText">Sign in</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </form>

  <p class="footer-text">
    Don't have an account? <a href="#">Sign up</a>
  </p>
</div>

<div class="state-bar">
  <button class="state-btn active" onclick="setState('default', this)">Default</button>
  <button class="state-btn" onclick="setState('focused', this)">Focus</button>
  <button class="state-btn" onclick="setState('error', this)">Error</button>
  <button class="state-btn" onclick="setState('loading', this)">Loading</button>
</div>

<script>
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const emailError = document.getElementById('emailError');
  const passwordError = document.getElementById('passwordError');
  const submitBtn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');

  function resetAll() {
    emailInput.value = '';
    passwordInput.value = '';
    emailInput.classList.remove('has-error');
    passwordInput.classList.remove('has-error');
    emailError.classList.remove('visible');
    passwordError.classList.remove('visible');
    submitBtn.disabled = false;
    btnText.style.display = 'inline';
    spinner.style.display = 'none';
    emailInput.blur();
    passwordInput.blur();
  }

  function setState(state, btn) {
    document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    resetAll();

    switch(state) {
      case 'focused':
        emailInput.value = 'user@example.com';
        passwordInput.focus();
        break;
      case 'error':
        emailInput.value = 'invalid-email';
        emailInput.classList.add('has-error');
        emailError.classList.add('visible');
        passwordInput.classList.add('has-error');
        passwordError.classList.add('visible');
        break;
      case 'loading':
        emailInput.value = 'user@example.com';
        passwordInput.value = '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
        submitBtn.disabled = true;
        btnText.style.display = 'none';
        spinner.style.display = 'block';
        break;
    }
  }

  function handleSubmit(e) {
    e.preventDefault();
    submitBtn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';
    document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[onclick*="loading"]').classList.add('active');
    setTimeout(() => {
      resetAll();
      document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[onclick*="default"]').classList.add('active');
    }, 2000);
  }
</script>

</body>
</html>
